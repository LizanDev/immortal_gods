services:
  - type: web
    name: immortal-gods
    env: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen && uv run python manage.py compilemessages
    preDeployCommand: uv run python manage.py migrate --noinput && uv run python manage.py collectstatic --noinput && uv run python manage.py seed_data && uv run python manage.py seed_synergies && uv run python manage.py create_superuser
    startCommand: uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: APP_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: immortal-gods-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "4"

databases:
  - name: immortal-gods-db
    plan: free
    ipAllowList: []
