{% extends "base.html" %}

{% block title %}Items - Immortal Gods{% endblock %}

{% block content %}
<h1>All Items</h1>
<div>
    {% for item in items %}
    <div>
        <h2><a href="{% url 'items:detail' item.id %}">{{ item.name }}</a></h2>
        <p>{{ item.get_item_type_display }} | Max Level: {{ item.max_level }}</p>
    </div>
    {% empty %}
    <p>No items available yet.</p>
    {% endfor %}
</div>
{% endblock %}
