{% extends "base.html" %}

{% block title %}Add Member - {{ team.name }}{% endblock %}

{% block content %}
<h1>Add Member to {{ team.name }}</h1>

<form method="post">
    {% csrf_token %}
    <label for="god_id">Select God:</label>
    <select name="god_id" id="god_id">
        {% for pg in gods %}
        <option value="{{ pg.id }}">{{ pg.god.name }} (Lv.{{ pg.level }})</option>
        {% endfor %}
    </select>

    <label for="position">Position:</label>
    <select name="position" id="position">
        {% for pos in positions %}
        <option value="{{ pos }}">{{ pos }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add</button>
</form>

<a href="{% url 'teams:detail' team.id %}">Back</a>
{% endblock %}
