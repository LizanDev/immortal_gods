{% extends "base.html" %}

{% block title %}Delete Team - Immortal Gods{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto; background: rgba(255, 50, 50, 0.1); padding: 2rem; border-radius: 12px; border: 1px solid #ff3232;">
    <h2 style="color: #ff3232;">Delete Team</h2>
    <p>Are you sure you want to delete the team "<strong>{{ team.name }}</strong>"?</p>
    <p style="font-size: 0.9rem; color: #aaa;">This action cannot be undone. All team members will be removed.</p>

    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn" style="background: #ff3232; color: white;">Delete Team</button>
            <a href="{% url 'teams:detail' team.id %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
