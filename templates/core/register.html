{% extends "base.html" %}

{% block title %}Registro - Immortal Gods{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h1>Registro</h1>

    <form method="post">
        {% csrf_token %}
        <label for="username">Usuario:</label>
        <input type="text" name="username" id="username" required>

        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" required>

        <label for="confirm_password">Confirmar contraseña:</label>
        <input type="password" name="confirm_password" id="confirm_password" required>

        <label for="referral_code">Código de referido (opcional):</label>
        <input type="text" name="referral_code" id="referral_code" placeholder="XXXX-XXXX" maxlength="12">

        <button type="submit" class="btn">Registrarse</button>
    </form>

    <p style="margin-top: 1rem;">
        ¿Ya tienes cuenta? <a href="{% url 'core:login' %}">Iniciar sesión</a>
    </p>
</div>
{% endblock %}
