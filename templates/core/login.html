{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-container {
        display: flex;
        min-height: calc(100vh - 180px);
        width: 100%;
    }
    .login-image {
        flex: 1;
        background: url('{% static "images/gods/login.webp" %}') center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-image-overlay {
        background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(26, 26, 62, 0.85));
        padding: 2rem 3rem;
        border-radius: 16px;
        border: 2px solid #e94560;
        text-align: center;
        max-width: 400px;
    }
    .login-image-overlay h2 {
        color: #fff;
        font-size: 2rem;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }
    .login-image-overlay p {
        color: #aaa;
        font-size: 1rem;
    }
    .login-form {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0a0a1a, #16213e);
    }
    .login-card {
        background: linear-gradient(145deg, #16213e, #1a1a3e);
        padding: 2.5rem;
        border-radius: 16px;
        border: 2px solid #333;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 380px;
    }
    .login-card h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #e94560;
        font-size: 1.5rem;
    }
    .login-card input {
        width: 100%;
        padding: 0.8rem;
        margin-bottom: 1rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        box-sizing: border-box;
    }
    .login-card input:focus {
        outline: none;
        border-color: #e94560;
        box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
    }
    .login-card .btn {
        width: 100%;
        padding: 0.8rem;
        font-size: 1.1rem;
        margin-top: 0.5rem;
    }
    .login-card p {
        text-align: center;
        margin-top: 1.5rem;
        color: #aaa;
    }
    .login-card a {
        color: #e94560;
        font-weight: bold;
    }
    @media (max-width: 900px) {
        .login-container {
            flex-direction: column;
        }
        .login-image {
            min-height: 200px;
            flex: none;
        }
        .login-form {
            flex: none;
            padding: 1.5rem;
        }
    }
</style>

<div class="login-container">
    <div class="login-image">
        <div class="login-image-overlay">
            <h2>Immortal Gods</h2>
            <p>¡Tu aventura te espera!</p>
        </div>
    </div>
    <div class="login-form">
        <div class="login-card">
            <h1>Iniciar Sesión</h1>
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" id="username" placeholder="Usuario" required>
                <input type="password" name="password" id="password" placeholder="Contraseña" required>
                <button type="submit" class="btn">Entrar</button>
            </form>
            <p>
                ¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
