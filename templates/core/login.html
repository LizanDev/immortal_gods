{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-fullpage {
        min-height: calc(100vh - 180px);
        background: url('{% static "images/gods/login.webp" %}') center/cover no-repeat;
        position: relative;
    }
    .login-form-overlay {
        position: absolute;
        top: 500px;
        right: 280px;
        background: rgba(10, 10, 26, 0.85);
        backdrop-filter: blur(10px);
        padding: 35px 40px;
        border-radius: 12px;
        border: 2px solid rgba(233, 69, 96, 0.6);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
        min-width: 320px;
    }
    .login-form-overlay h1 {
        text-align: center;
        color: #fff;
        margin-bottom: 25px;
        font-size: 1.6rem;
        text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }
    .login-form-overlay input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s;
    }
    .login-form-overlay input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }
    .login-form-overlay input:focus {
        outline: none;
        border-color: #e94560;
        background: rgba(233, 69, 96, 0.15);
        box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
    }
    .login-form-overlay .btn {
        width: 100%;
        padding: 12px;
        font-size: 1.1rem;
        margin-top: 5px;
        background: linear-gradient(135deg, #e94560, #c73650);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        color: #fff;
        font-weight: bold;
    }
    .login-form-overlay .btn:hover {
        transform: scale(1.03);
        box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
    }
    .login-form-overlay p {
        text-align: center;
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.7);
    }
    .login-form-overlay a {
        color: #e94560;
        font-weight: bold;
        text-decoration: none;
    }
    .login-form-overlay a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-fullpage">
    <div class="login-form-overlay">
        <h1>IMMORTAL GODS</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" id="username" placeholder="Usuario" required>
            <input type="password" name="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">ENTRAR</button>
        </form>
        <p>
            ¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
