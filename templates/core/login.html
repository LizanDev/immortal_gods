{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0a0a1a, #16213e);
    }
    .login-card {
        background: linear-gradient(145deg, #16213e, #1a1a3e);
        padding: 2.5rem;
        border-radius: 16px;
        border: 2px solid #e94560;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        max-width: 400px;
        width: 100%;
    }
    .login-card h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #e94560;
        font-size: 1.8rem;
    }
    .login-card input {
        width: 100%;
        padding: 0.8rem;
        margin-bottom: 1rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        box-sizing: border-box;
    }
    .login-card input:focus {
        outline: none;
        border-color: #e94560;
        box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
    }
    .login-card .btn {
        width: 100%;
        padding: 0.8rem;
        font-size: 1.1rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, #e94560, #c73650);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #fff;
        font-weight: bold;
    }
    .login-card .btn:hover {
        transform: scale(1.03);
        box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
    }
    .login-card p {
        text-align: center;
        margin-top: 1.5rem;
        color: #aaa;
    }
    .login-card a {
        color: #e94560;
        font-weight: bold;
        text-decoration: none;
    }
    .login-card a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-page">
    <div class="login-card">
        <h1>Iniciar Sesión</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" id="username" placeholder="Usuario" required>
            <input type="password" name="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <p>
            ¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
