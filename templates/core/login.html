{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0a0a1a 0%, #16213e 50%, #1a1a3e 100%);
        position: relative;
        overflow: hidden;
    }
    .login-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("{% static 'images/login.webp' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.4;
        z-index: 0;
    }
    .login-page::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(10, 10, 26, 0.8) 100%);
        z-index: 1;
    }
    .login-card {
        position: relative;
        z-index: 2;
        background: rgba(6, 10, 26, 0.85);
        padding: 3rem 2.5rem;
        border-radius: 20px;
        border: 2px solid rgba(233, 69, 96, 0.6);
        box-shadow: 0 0 60px rgba(233, 69, 96, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        max-width: 420px;
        width: 100%;
        animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
        0%, 100% { box-shadow: 0 0 60px rgba(233, 69, 96, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.5); }
        50% { box-shadow: 0 0 80px rgba(233, 69, 96, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.7); }
    }
    .login-card h1 {
        text-align: center;
        margin-bottom: 0.5rem;
        color: #e94560;
        font-size: 2rem;
        text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        letter-spacing: 3px;
        font-weight: 800;
    }
    .login-card .subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        letter-spacing: 2px;
    }
    .login-card input {
        width: 100%;
        padding: 1rem;
        margin-bottom: 1.2rem;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(233, 69, 96, 0.3);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s;
    }
    .login-card input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    .login-card input:focus {
        outline: none;
        border-color: #e94560;
        background: rgba(233, 69, 96, 0.1);
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }
    .login-card .btn {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, #e94560, #ff6b6b);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #fff;
        font-weight: bold;
        letter-spacing: 2px;
        transition: all 0.3s;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    .login-card .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 40px rgba(233, 69, 96, 0.6);
    }
    .login-card p {
        text-align: center;
        margin-top: 1.5rem;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
    }
    .login-card a {
        color: #ff9aa0;
        font-weight: bold;
        text-decoration: none;
        transition: color 0.3s;
    }
    .login-card a:hover {
        color: #e94560;
        text-decoration: underline;
    }
    .divider {
        text-align: center;
        margin: 1.5rem 0;
        position: relative;
    }
    .divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.5), transparent);
    }
    .divider span {
        background: rgba(6, 10, 26, 0.85);
        padding: 0 1rem;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        position: relative;
    }
    @media (max-width: 480px) {
        .login-card { padding: 2rem 1.5rem; }
        .login-card h1 { font-size: 1.6rem; }
    }
</style>

<div class="login-page">
    <div class="login-card">
        <h1>IMMORTAL GODS</h1>
        <p class="subtitle">El destino de los dioses te espera</p>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" id="username" placeholder="Nombre de usuario" required>
            <input type="password" name="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">INVOCAR PODER</button>
        </form>
        <div class="divider"><span>o</span></div>
        <p>
            ¿Nuevo en el Olimpo? <a href="{% url 'core:register' %}">Crea tu leyenda</a>
        </p>
    </div>
</div>
{% endblock %}
