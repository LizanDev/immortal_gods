{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-fullpage {
        min-height: calc(100vh - 180px);
        background: url('{% static "images/gods/login.webp" %}') center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    .login-form-overlay {
        background: rgba(10, 10, 26, 0.75);
        backdrop-filter: blur(15px);
        padding: 3rem 3.5rem;
        border-radius: 20px;
        border: 2px solid rgba(233, 69, 96, 0.5);
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7);
        text-align: center;
        max-width: 420px;
        width: 100%;
    }
    .login-form-overlay h1 {
        color: #fff;
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
        letter-spacing: 2px;
    }
    .login-form-overlay .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }
    .login-form-overlay input {
        width: 100%;
        padding: 14px 18px;
        margin-bottom: 1rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s;
    }
    .login-form-overlay input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    .login-form-overlay input:focus {
        outline: none;
        border-color: #e94560;
        background: rgba(233, 69, 96, 0.15);
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }
    .login-form-overlay .btn {
        width: 100%;
        padding: 14px;
        font-size: 1.2rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, #e94560, #ff6b6b);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
        color: #fff;
        font-weight: bold;
        letter-spacing: 1px;
    }
    .login-form-overlay .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 30px rgba(233, 69, 96, 0.5);
    }
    .login-form-overlay p {
        margin-top: 1.5rem;
        color: rgba(255, 255, 255, 0.6);
    }
    .login-form-overlay a {
        color: #ff6b6b;
        font-weight: bold;
        text-decoration: none;
    }
    .login-form-overlay a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-fullpage">
    <div class="login-form-overlay">
        <h1>IMMORTAL GODS</h1>
        <p class="subtitle">Tu destino te espera</p>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" id="username" placeholder="Usuario" required>
            <input type="password" name="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">ENTRAR</button>
        </form>
        <p>
            ¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
