{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0a0a1a 0%, #16213e 50%, #1a1a3e 100%);
        position: relative;
        overflow: hidden;
    }
    .login-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("{% static 'images/gods/login.webp' %}?v=2");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.4;
        z-index: 0;
    }
    .login-page::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(10, 10, 26, 0.8) 100%);
        z-index: 1;
    }
    .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }
    .particle {
        position: absolute;
        background: radial-gradient(circle, rgba(233,69,96,0.8) 0%, transparent 70%);
        border-radius: 50%;
        animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
        50% { opacity: 0.6; }
        100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }
    .login-card {
        position: relative;
        z-index: 2;
        background: rgba(6, 10, 26, 0.85);
        padding: 3rem 2.5rem;
        border-radius: 20px;
        border: 2px solid rgba(233, 69, 96, 0.6);
        box-shadow: 0 0 60px rgba(233, 69, 96, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        max-width: 420px;
        width: 100%;
        animation: glow 3s ease-in-out infinite, pulse 2s ease-in-out infinite;
    }
    @keyframes glow {
        0%, 100% { box-shadow: 0 0 60px rgba(233, 69, 96, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.5); border-color: rgba(233, 69, 96, 0.6); }
        50% { box-shadow: 0 0 80px rgba(233, 69, 96, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.7); border-color: rgba(233, 69, 96, 1); }
    }
    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
    }
    .login-card h1 {
        text-align: center;
        margin-bottom: 0.5rem;
        color: #e94560;
        font-size: 2rem;
        text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        letter-spacing: 3px;
        font-weight: 800;
        animation: titleGlow 2s ease-in-out infinite;
    }
    @keyframes titleGlow {
        0%, 100% { text-shadow: 0 0 20px rgba(233, 69, 96, 0.8); }
        50% { text-shadow: 0 0 40px rgba(233, 69, 96, 1), 0 0 60px rgba(233, 69, 96, 0.6); }
    }
    .login-card .subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        letter-spacing: 2px;
    }
    .input-group {
        position: relative;
        margin-bottom: 1.2rem;
    }
    .login-card input {
        width: 100%;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(233, 69, 96, 0.3);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s;
    }
    .login-card input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    .login-card input:focus {
        outline: none;
        border-color: #e94560;
        background: rgba(233, 69, 96, 0.1);
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }
    .input-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
        opacity: 0.5;
        transition: opacity 0.3s;
    }
    .login-card .btn {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, #e94560, #ff6b6b);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #fff;
        font-weight: bold;
        letter-spacing: 2px;
        transition: all 0.3s;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
    }
    .login-card .btn::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
        transform: rotate(45deg);
        transition: all 0.5s;
    }
    .login-card .btn:hover::before {
        left: 100%;
    }
    .login-card .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 40px rgba(233, 69, 96, 0.6);
    }
    .login-card p {
        text-align: center;
        margin-top: 1.5rem;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
    }
    .login-card a {
        color: #ff9aa0;
        font-weight: bold;
        text-decoration: none;
        transition: color 0.3s;
    }
    .login-card a:hover {
        color: #e94560;
        text-decoration: underline;
    }
    .divider {
        text-align: center;
        margin: 1.5rem 0;
        position: relative;
    }
    .divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.5), transparent);
    }
    .divider span {
        background: rgba(6, 10, 26, 0.85);
        padding: 0 1rem;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        position: relative;
    }
    @media (max-width: 480px) {
        .login-card { padding: 2rem 1.5rem; }
        .login-card h1 { font-size: 1.6rem; }
    }
</style>

<div class="login-page">
    <div class="particles" id="particles"></div>
    <div class="login-card">
        <h1>IMMORTAL GODS</h1>
        <p class="subtitle">El destino de los dioses te espera</p>
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="username" id="username" placeholder="Nombre de usuario" required>
                <span class="input-icon">👤</span>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Contraseña" required>
                <span class="input-icon">🔒</span>
            </div>
            <button type="submit" class="btn">INVOCAR PODER</button>
        </form>
        <div class="divider"><span>o</span></div>
        <p>
            ¿Nuevo en el Olimpo? <a href="{% url 'core:register' %}">Crea tu leyenda</a>
        </p>
    </div>
</div>

<script>
    // Partículas flotantes
    const particlesContainer = document.getElementById('particles');
    const particleCount = 30;

    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.width = (Math.random() * 10 + 5) + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDelay = Math.random() * 3 + 's';
        particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
        particlesContainer.appendChild(particle);
    }

    // Efecto en inputs
    document.querySelectorAll('.login-card input').forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.querySelector('.input-icon').style.opacity = '1';
        });
        input.addEventListener('blur', () => {
            input.parentElement.querySelector('.input-icon').style.opacity = '0.5';
        });
    });
</script>
{% endblock %}
