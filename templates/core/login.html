{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    .login-page {
        height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050508;
        position: relative;
        overflow: hidden;
    }

    /* Fondo con imagen y overlays */
    .bg-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }
    .bg-layer.bg-image {
        background-image: url("{% static 'images/gods/download.webp' %}");
        background-size: cover;
        background-position: right center;
        z-index: 0;
    }
    .bg-layer.bg-overlay {
        background: linear-gradient(to right, rgba(5,5,8,0.85) 0%, rgba(5,5,8,0.4) 60%, transparent 100%);
        z-index: 1;
    }

    /* Imagen del dios a la derecha */
    .god-image-bg {
        position: absolute;
        right: 5%;
        top: 50%;
        transform: translateY(-50%);
        width: 40%;
        max-width: 450px;
        height: 80%;
        z-index: 1;
        pointer-events: none;
        opacity: 0.25;
        mask-image: linear-gradient(to left, rgba(0,0,0,0.7) 0%, transparent 60%);
        -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.7) 0%, transparent 60%);
    }
    .god-image-bg img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 50px rgba(233,69,96,0.5));
        animation: godFloat 5s ease-in-out infinite;
    }
    @keyframes godFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }

    /* Rayos */
    .lightning {
        position: absolute;
        top: -100px;
        width: 2px;
        height: 150px;
        background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, transparent 100%);
        opacity: 0;
        z-index: 2;
        filter: blur(1px);
        pointer-events: none;
    }
    .lightning.flash {
        animation: lightningStrike 0.2s ease-out;
    }
    @keyframes lightningStrike {
        0% { opacity: 0; }
        30% { opacity: 1; }
        100% { opacity: 0; }
    }

    /* Partículas */
    .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
        overflow: hidden;
    }
    .energy-particle {
        position: absolute;
        border-radius: 50%;
        animation: energyFloat 3s ease-in-out infinite;
    }
    @keyframes energyFloat {
        0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
        50% { opacity: 0.7; }
        100% { transform: translateY(-50vh) scale(0.5); opacity: 0; }
    }

    /* Carta principal */
    .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 360px;
        background: linear-gradient(180deg, rgba(20,10,35,0.95) 0%, rgba(10,5,20,0.98) 100%);
        border-radius: 20px;
        padding: 2rem 1.8rem;
        border: 1px solid rgba(233,69,96,0.4);
        box-shadow:
            0 0 60px rgba(233,69,96,0.2),
            0 0 100px rgba(88,28,135,0.15),
            inset 0 1px 0 rgba(255,255,255,0.1);
        backdrop-filter: blur(20px);
        animation: cardGlow 3s ease-in-out infinite;
    }
    @keyframes cardGlow {
        0%, 100% { box-shadow: 0 0 60px rgba(233,69,96,0.2), 0 0 100px rgba(88,28,135,0.15), inset 0 1px 0 rgba(255,255,255,0.1); }
        50% { box-shadow: 0 0 80px rgba(233,69,96,0.35), 0 0 120px rgba(88,28,135,0.2), inset 0 1px 0 rgba(255,255,255,0.1); }
    }

    /* Logo */
    .logo-container {
        text-align: center;
        margin-bottom: 1.5rem;
    }
    .logo-icon {
        font-size: 2.5rem;
        display: inline-block;
        animation: logoPulse 2s ease-in-out infinite;
        filter: drop-shadow(0 0 15px rgba(255,200,50,0.6));
    }
    @keyframes logoPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }
    .logo-title {
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: 3px;
        background: linear-gradient(180deg, #fff 0%, #e94560 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 2px 8px rgba(233,69,96,0.5));
    }
    .logo-subtitle {
        font-size: 0.7rem;
        color: rgba(255,255,255,0.5);
        letter-spacing: 2px;
        margin-top: 0.25rem;
        text-transform: uppercase;
    }

    .decorative-line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(233,69,96,0.6), transparent);
        margin: 1.2rem 0;
    }

    /* Inputs */
    .input-group {
        position: relative;
        margin-bottom: 0.8rem;
    }
    .input-group input {
        width: 100%;
        padding: 0.85rem 1rem 0.85rem 2.8rem;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.3s;
    }
    .input-group input::placeholder {
        color: rgba(255,255,255,0.35);
    }
    .input-group input:focus {
        outline: none;
        border-color: #e94560;
        background: rgba(233,69,96,0.1);
        box-shadow: 0 0 15px rgba(233,69,96,0.2);
    }
    .input-icon {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
        opacity: 0.5;
        pointer-events: none;
        transition: all 0.3s;
    }
    .input-group input:focus ~ .input-icon {
        opacity: 1;
        color: #e94560;
    }

    /* Botón */
    .btn-invoke {
        width: 100%;
        padding: 0.9rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, #e94560 0%, #c73650 100%);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 2px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
        text-transform: uppercase;
    }
    .btn-invoke::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        transition: left 0.5s;
    }
    .btn-invoke:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(233,69,96,0.4);
    }
    .btn-invoke:hover::before {
        left: 100%;
    }

    /* Links */
    .login-links {
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.5);
    }
    .login-links a {
        color: #e94560;
        font-weight: 600;
        text-decoration: none;
    }
    .login-links a:hover {
        color: #ff6b6b;
        text-decoration: underline;
    }

    /* Footer */
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 0.8rem;
        border-top: 1px solid rgba(255,255,255,0.05);
    }
    .faction-icons {
        display: flex;
        justify-content: center;
        gap: 0.8rem;
        margin-bottom: 0.4rem;
        font-size: 1rem;
        opacity: 0.35;
    }
    .login-footer p {
        font-size: 0.6rem;
        color: rgba(255,255,255,0.3);
        letter-spacing: 1px;
    }

    @media (max-width: 600px) {
        html, body { overflow: auto; }
        .god-image-bg { display: none; }
        .login-card { margin: 1rem; max-width: 100%; }
    }
</style>

<div class="login-page">
    <!-- Capas de fondo -->
    <div class="bg-layer bg-image"></div>
    <div class="bg-layer bg-overlay"></div>

    <!-- Imagen del dios -->
    <div class="god-image-bg">
        <img src="{% static 'images/gods/download.png' %}" alt="God">
    </div>

    <!-- Rayos -->
    <div class="lightning" id="lightning1" style="left: 20%;"></div>
    <div class="lightning" id="lightning2" style="left: 70%;"></div>
    <div class="lightning" id="lightning3" style="left: 45%;"></div>

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <!-- Carta de login -->
    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">⚡</div>
            <h1 class="logo-title">IMMORTAL GODS</h1>
            <p class="logo-subtitle">El Olimpo te espera</p>
        </div>

        <div class="decorative-line"></div>

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="username" id="username" placeholder="Nombre de guerrero" required autocomplete="username">
                <span class="input-icon">👤</span>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Contraseña divina" required autocomplete="current-password">
                <span class="input-icon">🔮</span>
            </div>
            <button type="submit" class="btn-invoke">⚔ Invocar Poder ⚔</button>
        </form>

        <div class="login-links">
            ¿Sin poderes? <a href="{% url 'core:register' %}">Únete al Olimpo</a>
        </div>

        <div class="login-footer">
            <div class="faction-icons">⚔️ 🛡️ ☥ ☯ ♋</div>
            <p>78 DIOSES • 5 PANTEONES</p>
        </div>
    </div>
</div>

<script>
    // Partículas
    const particlesContainer = document.getElementById('particles');
    const colors = ['#e94560', '#ffd700', '#4a9eff', '#a855f7'];

    for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'energy-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = (Math.random() * 50 + 50) + '%';
        particle.style.width = (Math.random() * 4 + 2) + 'px';
        particle.style.height = particle.style.width;
        particle.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]} 0%, transparent 70%)`;
        particle.style.animationDelay = Math.random() * 3 + 's';
        particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
        particlesContainer.appendChild(particle);
    }

    // Rayos
    function triggerLightning() {
        const idx = Math.floor(Math.random() * 3) + 1;
        const lightning = document.getElementById('lightning' + idx);
        lightning.classList.add('flash');
        setTimeout(() => lightning.classList.remove('flash'), 200);
    }
    setInterval(triggerLightning, 5000);
</script>
{% endblock %}
