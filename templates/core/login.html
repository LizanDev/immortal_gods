{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0a0a1a 0%, #16213e 50%, #1a1a3e 100%);
    }
    .login-card {
        position: relative;
        border-radius: 18px;
        border: 2px solid #e94560;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.75), 0 0 40px rgba(233, 69, 96, 0.15);
        overflow: hidden;
        max-width: 900px;
        width: 100%;
        min-height: 480px;
        background-image: url("{% static 'images/gods/download.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: transparent;
    }
    /* .login-card-image not used when using background-image on .login-card */
    .login-card-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 280px;
        padding: 1.5rem 1.8rem 1.8rem;
        background: rgba(6, 10, 20, 0.7);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.7);
        backdrop-filter: blur(6px);
        z-index: 2;
    }
    .login-card-content h1,
    .login-card-content .subtitle {
        display: none;
    }
    .login-card-content input {
        width: 100%;
        padding: 8px 12px;
        margin-bottom: 0.7rem;
        background: rgba(255, 255, 255, 0.06);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 0.9rem;
        box-sizing: border-box;
        transition: all 0.15s;
        text-align: center;
    }
    .login-card-content input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }
    .login-card-content input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: none;
    }
    .login-card-content .btn {
        width: 100%;
        padding: 12px 0;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.15s;
        color: #fff;
        font-weight: 700;
        letter-spacing: 1px;
        margin-top: 0;
    }

    @media (max-width: 600px) {
        .login-card { min-height: 380px; max-width: 420px; }
        .login-card-image { height: 200px; }
        .login-card-content { width: 86%; padding: 0.9rem; top: 50%; }
        .login-card-content h1 { font-size: 1.2rem; }
        .login-card-content input { padding: 10px 12px; font-size: 0.95rem; }
        .login-card-content .btn { padding: 10px; font-size: 0.98rem; }
    }
    @media (max-width: 380px) {
        .login-page { padding: 1rem; }
        .login-card { border-radius: 12px; min-height: 360px; }
        .login-card-image { height: 160px; }
        .login-card-content { top: 40%; width: 92%; padding: 0.7rem; }
        .login-card-content h1 { font-size: 1.1rem; }
    }
    .forgot-link {
        display: block;
        text-align: center;
        margin-top: 0.8rem;
        color: rgba(255,255,255,0.85);
        font-weight: 600;
        text-decoration: none;
    }
    .forgot-link:hover {
        text-decoration: underline;
        color: #ffb3b3;
    }
    .login-card-content .btn:hover {
        transform: scale(1.03);
        box-shadow: 0 15px 40px rgba(233, 69, 96, 0.5);
    }
    .login-card-content p {
        text-align: center;
        margin-top: 0.5rem;
        color: rgba(255, 255, 255, 0.95);
        font-size: 0.95rem;
    }
    .login-card-content a {
        color: #ffb3b3;
        font-weight: 700;
        text-decoration: none;
    }
    .login-card-content a.register-link {
        color: #ffb3b3;
        display: inline-block;
        margin-top: 0.2rem;
    }
    .login-card-content a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-page">
    <div class="login-card">
        <div class="login-card-content">
            <h1>IMMORTAL GODS</h1>
            <p class="subtitle">Tu destino te espera</p>
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" id="username" placeholder="Usuario" required>
                <input type="password" name="password" id="password" placeholder="Contraseña" required>
                <button type="submit" class="btn">ENTRAR</button>
                <a href="#" class="forgot-link">¿Olvidaste la contraseña?</a>
            </form>
            <p>
                ¿No tienes cuenta? <a href="{% url 'core:register' %}" class="register-link">Regístrate</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
