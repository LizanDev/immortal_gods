{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(rgba(10, 10, 26, 0.85), rgba(10, 10, 26, 0.95)),
                    url('{% static "images/gods/login.webp" %}') center/cover no-repeat;
        padding: 2rem 1rem;
    }
    .login-card {
        background: linear-gradient(145deg, #16213e, #1a1a3e);
        padding: 2.5rem;
        border-radius: 16px;
        border: 2px solid #e94560;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        max-width: 400px;
        width: 100%;
    }
    .login-card h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #fff;
        text-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
    }
    .login-card input {
        width: 100%;
        padding: 0.8rem;
        margin-bottom: 1rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
    }
    .login-card input:focus {
        outline: none;
        border-color: #e94560;
        box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
    }
    .login-card .btn {
        width: 100%;
        padding: 0.8rem;
        font-size: 1.1rem;
        margin-top: 0.5rem;
    }
    .login-card p {
        text-align: center;
        margin-top: 1.5rem;
        color: #aaa;
    }
    .login-card a {
        color: #e94560;
        font-weight: bold;
    }
    .logo-container {
        text-align: center;
        margin-bottom: 1.5rem;
    }
    .logo-container img {
        max-width: 120px;
        margin-bottom: 0.5rem;
    }
</style>

<div class="login-page">
    <div class="login-card">
        <div class="logo-container">
            <img src="{% static 'images/logo.webp' %}" alt="Immortal Gods" onerror="this.style.display='none'">
        </div>
        <h1>Immortal Gods</h1>

        <form method="post">
            {% csrf_token %}
            <label for="username" style="color: #aaa; margin-bottom: 0.3rem; display: block;">Usuario</label>
            <input type="text" name="username" id="username" placeholder="Ingresa tu usuario" required>

            <label for="password" style="color: #aaa; margin-bottom: 0.3rem; display: block;">Contraseña</label>
            <input type="password" name="password" id="password" placeholder="Ingresa tu contraseña" required>

            <button type="submit" class="btn">Entrar</button>
        </form>

        <p>
            ¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
