{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión - Immortal Gods{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0a0a1a 0%, #16213e 50%, #1a1a3e 100%);
    }
    .login-card {
        background: linear-gradient(145deg, #16213e, #1a1a3e);
        border-radius: 24px;
        border: 3px solid #e94560;
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8), 0 0 60px rgba(233, 69, 96, 0.2);
        overflow: hidden;
        max-width: 600px;
        width: 100%;
    }
    .login-card-image {
        width: 100%;
        height: 320px;
        object-fit: cover;
        display: block;
        border-bottom: 3px solid #e94560;
    }
    .login-card-content {
        padding: 3rem 3.5rem;
    }
    .login-card-content h1 {
        color: #fff;
        font-size: 2.5rem;
        text-align: center;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
        letter-spacing: 4px;
    }
    .login-card-content .subtitle {
        color: rgba(255, 255, 255, 0.5);
        text-align: center;
        font-size: 1rem;
        margin-bottom: 2.5rem;
    }
    .login-card-content input {
        width: 100%;
        padding: 18px 24px;
        margin-bottom: 1.2rem;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        color: #fff;
        font-size: 1.2rem;
        box-sizing: border-box;
        transition: all 0.3s;
    }
    .login-card-content input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    .login-card-content input:focus {
        outline: none;
        border-color: #e94560;
        background: rgba(233, 69, 96, 0.15);
        box-shadow: 0 0 25px rgba(233, 69, 96, 0.4);
    }
    .login-card-content .btn {
        width: 100%;
        padding: 18px;
        font-size: 1.4rem;
        background: linear-gradient(135deg, #e94560, #ff6b6b);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.3s;
        color: #fff;
        font-weight: bold;
        letter-spacing: 3px;
        margin-top: 0.5rem;
    }
    .login-card-content .btn:hover {
        transform: scale(1.03);
        box-shadow: 0 15px 40px rgba(233, 69, 96, 0.5);
    }
    .login-card-content p {
        text-align: center;
        margin-top: 2rem;
        color: rgba(255, 255, 255, 0.6);
        font-size: 1rem;
    }
    .login-card-content a {
        color: #ff6b6b;
        font-weight: bold;
        text-decoration: none;
    }
    .login-card-content a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-page">
    <div class="login-card">
        <img src="{% static 'images/gods/login.webp' %}" alt="Immortal Gods" class="login-card-image">
        <div class="login-card-content">
            <h1>IMMORTAL GODS</h1>
            <p class="subtitle">Tu destino te espera</p>
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" id="username" placeholder="Usuario" required>
                <input type="password" name="password" id="password" placeholder="Contraseña" required>
                <button type="submit" class="btn">ENTRAR</button>
            </form>
            <p>
                ¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
